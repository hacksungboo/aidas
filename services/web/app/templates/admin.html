<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AIDAS 장애 제어판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .logo-btn { cursor: pointer; transition: opacity 0.2s; }
        .logo-btn:hover { opacity: 0.7; }
        .incident-item-btn { text-align: left; transition: all 0.2s; border-radius: 6px; }
        .incident-item-btn:hover { background-color: #495057; color: white; }
        .incident-item-btn.active-target { background-color: #dc3545 !important; border-color: #dc3545 !important; color: white !important; }
    </style>
</head>
<body class="bg-dark text-white m-0 p-0 vh-100">
    <div class="container-fluid p-4 h-100 d-flex flex-column">
        
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h2 class="fw-bold text-warning m-0 logo-btn" onclick="window.location.href='/'">🛡️ AIDAS </h2>
            <span class="badge bg-danger px-3 py-2 fs-6">⚠️ INCIDENT CONTROLLER</span>
        </div>
        
        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="p-4 bg-dark rounded shadow-sm h-100">
                    <h5 class="text-white mb-4 fw-bold text-muted">📋 장애 정보</h5>
                    <div class="d-grid gap-3">
                        <button class="btn btn-outline-light py-3 incident-item-btn" onclick="bindIncident('DB Connection Timeout', 'db-timeout', this)">
                            🔌 DB Connection Timeout
                        </button>
                        <button class="btn btn-outline-light py-3 incident-item-btn" onclick="bindIncident('Out of Memory (OOM)', 'oom', this)">
                            🧠 Out of Memory (OOM)
                        </button>
                        <button class="btn btn-outline-light py-3 incident-item-btn" onclick="bindIncident('Disk Full', 'disk-full', this)">
                            💾 Disk Full
                        </button>
                        <button class="btn btn-outline-light py-3 incident-item-btn" onclick="bindIncident('HTTP 500 Code Error', 'http500', this)">
                            🌐 HTTP 500 Code Error
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-7 mb-4">
                <div class="p-4 bg-dark rounded shadow-sm h-100 d-flex flex-column justify-content-between">
                    <div>
                        <h5 class="text-white mb-4 fw-bold text-muted">🎯 선택된 장애 정보</h5>
                        <div class="p-4 rounded border border-secondary bg-black bg-opacity-40 text-center my-4">
                            <p class="fs-4 fw-bold text-info m-0" id="target-label-screen">장애 유형을 선택해 주세요.</p>
                        </div>
                    </div>
                    <div class="text-end mt-4">
                        <button class="btn btn-outline-danger btn-lg py-3 w-100 fw-bold" id="action-trigger-btn" disabled onclick="executeInjection()">
                            ⚡ 장애 강제 주입
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
    <a href="/monitoring" class="btn btn-info btn-lg w-100 fw-bold">
        📊 모니터링 대시보드 페이지로 이동
    </a>
</div>

    <script>
        let selectedIncidentName = "";
        let selectedIncidentCode = "";

        document.getElementById('action-trigger-btn').disabled = true;

        function bindIncident(name, code, element) {
            selectedIncidentName = name;
            selectedIncidentCode = code;
            document.getElementById('target-label-screen').innerText = "■ 선택 대상: " + name;
            
            const triggerBtn = document.getElementById('action-trigger-btn');
            triggerBtn.disabled = false;
            triggerBtn.className = "btn btn-danger btn-lg py-3 w-100 fw-bold shadow-lg text-white";

            const allBtns = document.querySelectorAll('.incident-item-btn');
            allBtns.forEach(b => b.classList.remove('active-target'));
            element.classList.add('active-target');
        }

   async function executeInjection() {
    if (!selectedIncidentCode) {
        alert("장애 유형을 먼저 선택해주세요!");
        return;
    }

    // 1. 주입 시작 알림 (팝업창)
    alert(`[AIDAS] ${selectedIncidentName} 장애 주입을 시작합니다.`);

    const consoleBox = document.getElementById('runtime-console-box');
    consoleBox.innerHTML += `<div>[INFO] Sending ${selectedIncidentName}...</div>`;

    try {
        const response = await fetch(`/api/v1/incident/${selectedIncidentCode}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });

        if (response.ok) {
            const result = await response.json();
            // 2. 성공 시 알림
            alert(`성공: ${result.message}`);
            consoleBox.innerHTML += `<div class="text-success">[SUCCESS] ${result.message}</div>`;
        } else {
            const error = await response.json();
            // 3. 실패 시 알림
            alert(`에러 발생: ${error.detail}`);
            consoleBox.innerHTML += `<div class="text-danger">[ERROR] ${error.detail}</div>`;
        }
    } catch (err) {
        alert("서버 연결 실패!");
        consoleBox.innerHTML += `<div class="text-danger">[FATAL] Connection Failed</div>`;
    }
}
    </script>
</body>
</html>
