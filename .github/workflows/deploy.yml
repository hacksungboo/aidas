name: CD

on:
  push:
    branches: [master]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/aidas-web

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1. build-push — Docker Hub에 이미지 빌드 및 업로드
  # ────────────────────────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ────────────────────────────────────────────────────────────────
  # JOB 2. detect — 현재 운영중인 쪽 확인
  # ────────────────────────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    needs: build-push
    outputs:
      deploy_target: ${{ steps.check.outputs.deploy_target }}
      idle_asg:      ${{ steps.check.outputs.idle_asg }}
      active_asg:    ${{ steps.check.outputs.active_asg }}

    steps:
      - name: AWS CLI 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: 현재 운영중인 TG 확인
        id: check
        run: |
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names "aidas-alb" \
            --query "LoadBalancers[0].LoadBalancerArn" \
            --output text)

          LISTENER_ARN=$(aws elbv2 describe-listeners \
            --load-balancer-arn "$ALB_ARN" \
            --query "Listeners[?Port==\`443\`].ListenerArn" \
            --output text)

          BLUE_WEIGHT=$(aws elbv2 describe-listeners \
            --listener-arns "$LISTENER_ARN" \
            --query "Listeners[0].DefaultActions[0].ForwardConfig.TargetGroups[?TargetGroupArn==\`${{ secrets.BLUE_TG_ARN }}\`].Weight" \
            --output text)

          if [ "$BLUE_WEIGHT" = "100" ]; then
            echo "deploy_target=green" >> $GITHUB_OUTPUT
            echo "idle_asg=aidas-asg-green" >> $GITHUB_OUTPUT
            echo "active_asg=aidas-asg-blue" >> $GITHUB_OUTPUT
          else
            echo "deploy_target=blue" >> $GITHUB_OUTPUT
            echo "idle_asg=aidas-asg-blue" >> $GITHUB_OUTPUT
            echo "active_asg=aidas-asg-green" >> $GITHUB_OUTPUT
          fi

  # ────────────────────────────────────────────────────────────────
  # JOB 3. deploy — 유휴 ASG에 새 이미지 배포
  # ────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: detect

    steps:
      - name: AWS CLI 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Tailscale 연결
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
      - name: Tailscale 연결 확인
        run: |
          tailscale status
          tailscale ping 100.94.64.16 || true
      - name: 유휴 ASG 활성화 (min=2, max=4, desired=2)
        run: |
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${{ needs.detect.outputs.idle_asg }} \
            --min-size 2 \
            --max-size 4 \
            --desired-capacity 2

      - name: EC2 인스턴스 Running 상태 대기
        run: |
          echo "인스턴스가 부팅될 때까지 대기합니다..."
          aws ec2 wait instance-running \
            --filters \
              "Name=tag:aws:autoscaling:groupName,Values=${{ needs.detect.outputs.idle_asg }}" \
              "Name=instance-state-name,Values=pending,running"

      - name: user_data 실행 완료 대기 (60초)
        run: sleep 180

      - name: 유휴 ASG EC2 IP 조회
        run: |
          IPS=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:aws:autoscaling:groupName,Values=${{ needs.detect.outputs.idle_asg }}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].PrivateIpAddress" \
            --output text)
          echo "DEPLOY_IPS=$IPS" >> $GITHUB_ENV

      - name: aidas-ec2 경유 새 이미지 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_NAME,GITHUB_SHA,DEPLOY_IPS,DB_URL
          script: |
            for IP in $DEPLOY_IPS; do
              ssh -i ~/aidas-key.pem -o StrictHostKeyChecking=no ec2-user@$IP "
                docker pull $IMAGE_NAME:$GITHUB_SHA &&
                docker stop aidas-web || true &&
                docker rm aidas-web || true &&
                docker run -d \
                  --name aidas-web \
                  --restart unless-stopped \
                  -p 8000:8000 \
                  -e DB_URL=$DB_URL \
                  -v /var/log/apps:/var/log/apps \
                  $IMAGE_NAME:$GITHUB_SHA
              "
            done
        env:
          DB_URL: ${{ secrets.DB_URL }}

      - name: 헬스체크 대기
        run: |
          if [ "${{ needs.detect.outputs.deploy_target }}" = "green" ]; then
            IDLE_TG_ARN="${{ secrets.GREEN_TG_ARN }}"
          else
            IDLE_TG_ARN="${{ secrets.BLUE_TG_ARN }}"
          fi

          echo "ALB 헬스체크 대기중..."
          for i in $(seq 1 20); do
            HEALTHY=$(aws elbv2 describe-target-health \
              --target-group-arn "$IDLE_TG_ARN" \
              --query "TargetHealthDescriptions[?TargetHealth.State=='healthy'] | length(@)" \
              --output text)
            if [ "$HEALTHY" -ge "2" ]; then
              echo "헬스체크 통과! ($HEALTHY개)"
              exit 0
            fi
            echo "대기중... ($i/20)"
            sleep 15
          done
          echo "헬스체크 실패!"
          exit 1

  # ────────────────────────────────────────────────────────────────
  # JOB 4. switch-listener — ALB 트래픽 전환
  # ────────────────────────────────────────────────────────────────
  switch-listener:
    runs-on: ubuntu-latest
    needs: [detect, deploy]

    steps:
      - name: AWS CLI 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ALB 리스너 ARN 조회
        id: listener
        run: |
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names "aidas-alb" \
            --query "LoadBalancers[0].LoadBalancerArn" \
            --output text)

          LISTENER_ARN=$(aws elbv2 describe-listeners \
            --load-balancer-arn "$ALB_ARN" \
            --query "Listeners[1].ListenerArn" \
            --output text)

          echo "listener_arn=$LISTENER_ARN" >> $GITHUB_OUTPUT

      - name: 트래픽 전환
        run: |
          if [ "${{ needs.detect.outputs.deploy_target }}" = "green" ]; then
            BLUE_WEIGHT=0
            GREEN_WEIGHT=100
          else
            BLUE_WEIGHT=100
            GREEN_WEIGHT=0
          fi

          aws elbv2 modify-listener \
            --listener-arn ${{ steps.listener.outputs.listener_arn }} \
            --default-actions Type=forward,ForwardConfig="{
              TargetGroups=[
                {TargetGroupArn=${{ secrets.BLUE_TG_ARN }},Weight=$BLUE_WEIGHT},
                {TargetGroupArn=${{ secrets.GREEN_TG_ARN }},Weight=$GREEN_WEIGHT}
              ]
            }"

      - name: 이전 ASG 완전 종료 (min=0, max=0, desired=0)
        run: |
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${{ needs.detect.outputs.active_asg }} \
            --min-size 0 \
            --max-size 0 \
            --desired-capacity 0

          echo "## 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "| | 전환 전 | 전환 후 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.detect.outputs.deploy_target }}" = "green" ]; then
            echo "| Blue TG  | 100% | 0%   |" >> $GITHUB_STEP_SUMMARY
            echo "| Green TG | 0%   | 100% |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Blue TG  | 0%   | 100% |" >> $GITHUB_STEP_SUMMARY
            echo "| Green TG | 100% | 0%   |" >> $GITHUB_STEP_SUMMARY
          fi

  # ────────────────────────────────────────────────────────────────
  # JOB 5. rollback — 실패시 롤백 
  # ────────────────────────────────────────────────────────────────
  rollback:
    runs-on: ubuntu-latest
    needs: [detect, deploy, switch-listener]
    if: failure() && needs.detect.result == 'success'
    steps:
      - name: AWS CLI 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ALB 리스너 ARN 조회
        id: listener
        run: |
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names "aidas-alb" \
            --query "LoadBalancers[0].LoadBalancerArn" \
            --output text)

          LISTENER_ARN=$(aws elbv2 describe-listeners \
            --load-balancer-arn "$ALB_ARN" \
            --query "Listeners[?Port==\`443\`].ListenerArn" \
            --output text)

          echo "listener_arn=$LISTENER_ARN" >> $GITHUB_OUTPUT

      - name: 기존 운영으로 롤백
        run: |
          if [ "${{ needs.detect.outputs.deploy_target }}" = "green" ]; then
            BLUE_WEIGHT=100
            GREEN_WEIGHT=0
          else
            BLUE_WEIGHT=0
            GREEN_WEIGHT=100
          fi

          aws elbv2 modify-listener \
            --listener-arn ${{ steps.listener.outputs.listener_arn }} \
            --default-actions Type=forward,ForwardConfig="{
              TargetGroups=[
                {TargetGroupArn=${{ secrets.BLUE_TG_ARN }},Weight=$BLUE_WEIGHT},
                {TargetGroupArn=${{ secrets.GREEN_TG_ARN }},Weight=$GREEN_WEIGHT}
              ]
            }"

      - name: 유휴 ASG 다시 완전 종료 (min=0, max=0, desired=0)
        run: |
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${{ needs.detect.outputs.idle_asg }} \
            --min-size 0 \
            --max-size 0 \
            --desired-capacity 0

          echo "## 롤백 완료" >> $GITHUB_STEP_SUMMARY