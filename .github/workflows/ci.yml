name: CI

on:
  push:
    branches: [] ## 실행시에 "**"넣어주시면됩니다.
  pull_request:
    branches: [] ##실행시에 master넣어주시면됩니다.

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1. lint — Python 코드 품질 검사
  # 모든 브랜치 push / PR 마다 실행 ------- 변경해야하면 말씀해주세요
  # ────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 의존성 및 flake8 설치
        run: |
          pip install -r services/web/requirements.txt
          pip install flake8

      - name: flake8 코드 품질 검사
        run: |
          flake8 services/web/ \
            --max-line-length=120 \
            --exclude=services/web/app/templates \
            --statistics || true

  # ────────────────────────────────────────────────────────────────
  # JOB 2. build-test — Dockerfile 빌드 검증 
  # ────────────────────────────────────────────────────────────────
  build-test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 코드 체크아웃.
        uses: actions/checkout@v4

      - name: Docker 이미지 빌드 테스트
        run: |
          docker build -t aidas-web:test -f services/web/Dockerfile .
