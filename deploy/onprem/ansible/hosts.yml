# aidas/deploy/onprem/ansible/hosts.yml
# 역할:
# - 온프레미스 정적 인벤토리 파일
# - mgmt는 배포용 서버, rocky01은 중앙 관제 서버 /02는 에이전트 설치 대상 노드로 사용
# - 호출 시점: ansible-playbook 실행 시 ansible.cfg에 의해 자동 로드
# - 수행 흐름: playbook의 hosts 대상과 inventory 호스트 이름을 매칭

all:
  hosts:
    # mgmt:
    #   ansible_host: 172.16.8.200
    #   node_exporter_enabled: true
    #   promtail_enabled: true

    rocky01:
      ansible_host: 172.16.8.201
      node_exporter_enabled: true
      promtail_enabled: true
      ansible_user: user1

    rocky02:
      ansible_host: 172.16.8.202
      node_exporter_enabled: true
      promtail_enabled: true
      ansible_user: user1

    ubuntu:
      ansible_host: 172.16.8.203
      # 우분투는 일반 계정이 user1이므로 접속 계정을 명시해 줍니다.
      ansible_user: user1