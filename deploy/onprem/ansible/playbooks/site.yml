# aidas/deploy/onprem/ansible/playbooks/site.yml
# 역할:
# - 온프레미스 관제센터와 에이전트를 전체 구축하는 메인 playbook
# - 호출 시점: 초기 1회 전체 구축 시 사용
# - 수행 흐름:
#   1) 모든 노드에 Docker 설치
#   2) mgmt에 PLG stack 설치
#   3) mgmt에 Monitoring stack 설치
#   4) 모든 노드에 Promtail / Node Exporter 설치

---
- name: Install Docker on all on-prem nodes
  hosts: "rocky01,rocky02"
  become: true
  roles:
    - role: docker
      tags: ["docker"]

# [조장님 피드백 반영 완공]: 우분투 전용 도커 롤 적용
- name: Install Docker on ubuntu hosts
  hosts: ubuntu
  become: true
  roles:
    - role: docker_ubuntu   # 🔥 코드를 주렁주렁 적지 않고 서랍장 이름만 딱 호출!            
      tags: ["docker"]

- name: Deploy PLG stack on rocky01
  hosts: rocky01
  become: true
  roles:
    - plg_stack

- name: Deploy monitoring stack on rocky01
  hosts: rocky01
  become: true
  roles:
    - prometheus

- name: Deploy agents on all nodes
  hosts: rocky01, rocky02
  become: true
  roles:
    - role: promtail_agent
      when: promtail_enabled | default(true)
    - role: node_exporter_agent
      when: node_exporter_enabled | default(true)

- name: Deploy AIDAS AI pipeline on rocky01
  hosts: rocky01
  become: true
  roles:
    - rocky01_handler
    

- name: Deploy AIDAS Master Database on Rocky02 (Primary)
  hosts: rocky02
  become: true
  roles:
    - role: db_primary  

- name: Deploy AIDAS Replica Database on Ubuntu (Replica)
  hosts: ubuntu
  become: true
  roles:
    - role: db_replica  

   

