---
- name: "AIDAS 하이브리드 인프라 웹 서비스 및 DB 복제본 통합 자동 배포 (팀 공유용)"
  hosts: all
  become: false
  connection: local
  vars:
    # 💡 각자 자기 환경에 맞게 IP만 수정해서 쓰라고 안내하면 됩니다!
    main_db_ip: "172.16.8.202"
    ubuntu_ip: "172.16.8.203"

  tasks:
    # ================================================================
    # 🏢 1. 메인 웹 & DB 서버 작업 영역
    # ================================================================
    
    - name: "🏢 기존 구형 웹 컨테이너 강제 정리"
      ansible.builtin.shell: "docker rm -f aidas-web-service ccmall-web-service"
      failed_when: false

    - name: "🏢 최신 도커 이미지 빌드"
      ansible.builtin.shell: "docker build -t aidas-web:v1.0 -f services/web/Dockerfile ."
      args:
        # 💡 ansible_env.HOME을 쓰면 user1이든 root든 각자 사용자의 홈 폴더를 자동으로 추적합니다!
        chdir: "{{ ansible_env.HOME }}/aidas"

    - name: "🏢 리눅스 방화벽(firewalld) 정지"
      ansible.builtin.systemd:
        name: "firewalld"
        state: stopped
      become: true # 방화벽 정지는 root 권한이 필요하므로 이 태스크만 become 적용

    - name: "🏢 AIDAS 웹 서버 1번 복사본 가동"
      ansible.builtin.shell: |
        docker run -d --name aidas-web-service \
          -p 8000:8000 \
          -e DB_URL="postgresql://aidas_user:user1@{{ main_db_ip }}:5432/aidas_db" \
          --restart always \
          aidas-web:v1.0

    - name: "🏢 ➔ 우분투 전송용 이미지 아카이브 추출"
      ansible.builtin.shell: "docker save -o {{ ansible_env.HOME }}/aidas-web.tar aidas-web:v1.0"


    # ================================================================
    # 🏗️ 2. 서브 웹 & ReadOnly DB 복제본 서버 (ubuntu) 원격 제어 영역
    # ================================================================

    - name: "🏗️ [ubuntu] 원격 우분투 구형 웹 및 DB 복제본 컨테이너 싹 청소"
      ansible.builtin.shell: "ssh -o StrictHostKeyChecking=no user1@{{ ubuntu_ip }} 'sudo docker rm -f aidas-web-service ccmall-web-service aidas-db-replica'"
      failed_when: false

    - name: "🏗️ [ubuntu] 최신 웹 이미지 파일 원격 복사"
      ansible.builtin.shell: "scp -o StrictHostKeyChecking=no {{ ansible_env.HOME }}/aidas-web.tar user1@{{ ubuntu_ip }}:/home/user1/aidas-web.tar"

    - name: "🏗️ [ubuntu] 원격 우분투 내부에서 최신 웹 이미지 도커에 로드"
      ansible.builtin.shell: "ssh -o StrictHostKeyChecking=no user1@{{ ubuntu_ip }} 'sudo docker load -i /home/user1/aidas-web.tar'"

    - name: "🏗️ [ubuntu] 원격 우분투 AIDAS 웹 서버 2번 복사본 가동"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no user1@{{ ubuntu_ip }} 'sudo docker run -d --name aidas-web-service \
          -p 8000:8000 \
          -e DB_URL="postgresql://aidas_user:user1@{{ main_db_ip }}:5432/aidas_db" \
          --restart always \
          aidas-web:v1.0'

    - name: "🏗️ [ubuntu] ★ 원격 우분투 ReadOnly Replica 포스트그레스 15 복제본 DB 가동 ★"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no user1@{{ ubuntu_ip }} 'sudo docker run -d --name aidas-db-replica \
          -p 5433:5432 \
          -e POSTGRES_USER=aidas_user \
          -e POSTGRES_PASSWORD=user1 \
          -e POSTGRES_DB=aidas_db \
          --restart always \
          postgres:15'