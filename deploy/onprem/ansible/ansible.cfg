# aidas/deploy/onprem/ansible/ansible.cfg
# 역할:
# - 온프레미스 Ansible 실행 기본 설정 파일
# - hosts.yml을 기본 inventory로 사용하고, roles 디렉터리에서 role을 탐색
# - 호출 시점: ansible-playbook 실행 시 자동 적용
# - 수행 흐름: inventory 로드 -> playbook 실행 -> role 경로 참조

[defaults]
inventory = ./hosts.yml
remote_user = user1
host_key_checking = False
roles_path = ./roles
private_key_file = ~/.ssh/aidas_onprem.pem

[ssh_connection]
ssh_args = -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null