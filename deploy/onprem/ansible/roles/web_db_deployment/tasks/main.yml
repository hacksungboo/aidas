---
# ================================================================
# 🏢 [1부] 메인 본진 서버 (rocky02) 전용 배포 로직
# ================================================================
- name: "[Rocky02] 기존 구형 웹 컨테이너 정리"
  ansible.builtin.shell: "docker rm -f aidas-web-service ccmall-web-service"
  failed_when: false
  when: inventory_hostname == 'rocky02'

- name: "[Rocky02] 최신 도커 이미지 빌드"
  ansible.builtin.shell: "docker build -t aidas-web:v1.0 -f services/web/Dockerfile ."
  args:
    chdir: "{{ project_root }}"
  when: inventory_hostname == 'rocky02'

- name: "[Rocky02] 💡 루트에 있는 환경변수 파일(.env.rocky02)을 컨테이너용 .env로 안전 배달"
  ansible.builtin.copy:
    src: "{{ project_root }}/.env.rocky02"
    dest: "{{ project_root }}/services/web/.env"
  when: inventory_hostname == 'rocky02'

- name: "[Rocky02] 🔒 보안 준수: 실물 파일에서 비번을 동적 추출하여 .env에 DB_URL 추가 (비번 노출 없음)"
  ansible.builtin.lineinfile:
    path: "{{ project_root }}/services/web/.env"
    line: "DB_URL=postgresql://{{ db_user }}:{{ lookup('ansible.builtin.ini', 'DB_PASSWORD type=properties file=' ~ project_root ~ '/.env.rocky02') }}@{{ main_db_ip }}:5432/{{ db_name }}"
  when: inventory_hostname == 'rocky02'

- name: "[Rocky02] AIDAS 웹 서버 1번 복사본 가동 (배달된 .env 파일 참조)"
  ansible.builtin.shell: "docker run -d --name aidas-web-service -p 8000:8000 --env-file {{ project_root }}/services/web/.env --restart always aidas-web:v1.0"
  when: inventory_hostname == 'rocky02'

- name: "[Rocky02] ➔ 우분투 전송용 이미지 아카이브 추출"
  ansible.builtin.shell: "docker save -o /tmp/aidas-web.tar aidas-web:v1.0 && chmod 644 /tmp/aidas-web.tar"
  when: inventory_hostname == 'rocky02'

# ================================================================
# 🏗️ [2부] 원격 서브 복제본 서버 (ubuntu) 전용 배포 로직 (순정 SSH 활용)
# ================================================================
- name: "[Ubuntu] 원격 우분투 구형 컨테이너 싹 청소"
  ansible.builtin.shell: "sudo docker rm -f aidas-web-service ccmall-web-service aidas-db-replica"
  failed_when: false
  when: inventory_hostname == 'ubuntu'

- name: "[Ubuntu] Rocky02의 최신 웹 이미지 아카이브를 우분투로 원격 이송"
  ansible.builtin.copy:
    src: "/tmp/aidas-web.tar"
    dest: "/tmp/aidas-web.tar"
  when: inventory_hostname == 'ubuntu'

- name: "[Ubuntu] 최신 웹 이미지 도커에 로드"
  ansible.builtin.shell: "sudo docker load -i /tmp/aidas-web.tar"  # 🌟 원본의 경로 불일치 버그(/tmp에서 전송받고 /home에서 로드하던 부분) 교정!
  when: inventory_hostname == 'ubuntu'

- name: "[Ubuntu] 💡 우분투 서버용 환경변수 파일 복사 배달 (.env.rocky02 기반)"
  ansible.builtin.copy:
    src: "{{ project_root }}/.env.rocky02"
    dest: "/home/user1/.env"
  when: inventory_hostname == 'ubuntu'

- name: "[Ubuntu] 🔒 보안 준수: 우분투 .env 파일 내부에 웹용 주소 및 Postgres 필수 변수들 동적 삽입"
  ansible.builtin.lineinfile:
    path: "/home/user1/.env"
    line: "{{ item }}"
  loop:
    - "DB_URL=postgresql://{{ db_user }}:{{ lookup('ansible.builtin.ini', 'DB_PASSWORD type=properties file=' ~ project_root ~ '/.env.rocky02') }}@{{ ubuntu_ip }}:5433/{{ db_name }}"
    - "POSTGRES_USER={{ db_user }}"
    - "POSTGRES_PASSWORD={{ lookup('ansible.builtin.ini', 'DB_PASSWORD type=properties file=' ~ project_root ~ '/.env.rocky02') }}"
    - "POSTGRES_DB={{ db_name }}"
  when: inventory_hostname == 'ubuntu'

- name: "[Ubuntu] 📁 디비 볼륨용 디렉토리 사전 생성"
  ansible.builtin.file:
    path: "/home/user1/aidas"
    state: directory
    mode: '0755'
  when: inventory_hostname == 'ubuntu'

- name: "[Ubuntu] 💡 실종되었던 SQL 자동 시딩 파일(init.sql) 우분투 본체 경로로 동시 배달"
  ansible.builtin.copy:
    src: "{{ project_root }}/init.sql"
    dest: "/home/user1/aidas/init.sql"  # 🌟 조장님 디비가 바라보는 볼륨 마운트 경로와 정확히 일치시킴!
  when: inventory_hostname == 'ubuntu'
  
- name: "[Ubuntu] AIDAS 웹 서버 2번 복사본 가동 (env 파일 참조)"
  ansible.builtin.shell: |
    sudo docker run -d --name aidas-web-service \
      -p 8000:8000 \
      --env-file /home/user1/.env \
      --restart always \
      aidas-web:v1.0
  when: inventory_hostname == 'ubuntu'

- name: "[Ubuntu] ★ 원격 우분투 ReadOnly Replica DB 가동 및 SQL 자동 주입 데이터 시딩 ★"
  ansible.builtin.shell: |
    sudo docker run -d --name aidas-db-replica \
      -p 5433:5432 \
      --env-file /home/user1/.env \
      -v {{ ansible_env.HOME }}/aidas/init.sql:/docker-entrypoint-initdb.d/init.sql \
      --restart always \
      postgres:15
  when: inventory_hostname == 'ubuntu'