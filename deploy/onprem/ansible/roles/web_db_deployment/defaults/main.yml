main_db_ip: "172.16.8.202"
ubuntu_ip: "172.16.8.203"
db_user: "aidas_user"
db_name: "aidas_db"

# 🔒 [보안 안내] 
# 비밀번호(db_password)는 이 파일에 절대 하드코딩하지 않습니다.
# 프로젝트 루트(aidas/) 폴더 안의 로컬 가이드인 .env.rocky02 실물 파일 내부 시스템을 
# tasks에서 직접 복사하여 처리하므로, 앤서블 변수 장부에서는 완전히 제외합니다.