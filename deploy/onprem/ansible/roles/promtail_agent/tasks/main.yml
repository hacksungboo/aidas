# aidas/deploy/onprem/ansible/roles/promtail_agent/tasks/main.yml
# 역할:
# - 각 노드에 Promtail agent 설치 및 실행
# - 호출 시점: deploy_agents.yml 또는 site.yml에서 호출
# - 수행 흐름:
#   1) 디렉터리 생성
#   2) promtail config 템플릿 생성
#   3) compose 파일 생성
#   4) promtail 기동

---
- name: Create Promtail base directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ promtail_base_dir }}"
    - "{{ promtail_config_dir }}"

- name: Create Promtail positions directory with writable permission
  file:
    path: "{{ promtail_positions_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0777"  # 컨테이너 내부 유저가 positions.yaml을 자유롭게 쓸 수 있도록 보완

- name: Deploy Promtail config
  template:
    src: promtail-config.yaml.j2
    dest: "{{ promtail_config_dir }}/promtail-config.yaml"
    mode: "0644"
  register: promtail_cfg

- name: Deploy Promtail Docker Compose
  template:
    src: docker-compose-promtail.yml.j2
    dest: "{{ promtail_base_dir }}/docker-compose-promtail.yml"
    mode: "0644"
  register: compose_cfg

- name: Start or Update Promtail agent
  command: docker compose -f {{ promtail_base_dir }}/docker-compose-promtail.yml up -d
  args:
    chdir: "{{ promtail_base_dir }}"
  when: promtail_cfg.changed or compose_cfg.changed or not ansible_check_mode