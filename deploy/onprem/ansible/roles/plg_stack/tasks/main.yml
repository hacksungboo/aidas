- name: Deploy PLG Docker Compose
  template:
    src: docker-compose-plg.yml.j2
    dest: "{{ plg_base_dir }}/docker-compose-plg.yml"
    mode: "0644"
  register: compose_cfg

- name: Start or Update PLG stack
  command: docker compose -f {{ plg_base_dir }}/docker-compose-plg.yml up -d
  args:
    chdir: "{{ plg_base_dir }}"
  # 조건문에 grafana_loki_json.changed 추가
  when: >
    loki_cfg.changed or grafana_cfg.changed or compose_cfg.changed or 
    grafana_db_prov.changed or grafana_db_json.changed or 
    grafana_loki_json.changed or not ansible_check_mode

- name: Check Loki readiness
  uri:
    url: "http://127.0.0.1:{{ loki_http_port }}/ready"
    method: GET
    status_code: 200
  register: loki_ready
  retries: 12
  delay: 5
  until: loki_ready.status == 200