# aidas/deploy/onprem/ansible/roles/plg_stack/tasks/main.yml
# 역할:
# - rocky01 노드에 Loki / Grafana 및 Grafana datasource provisioning 파일을 배포
# - 호출 시점: deploy_plg.yml 또는 site.yml 실행 시
# - 수행 흐름:
#   1) 디렉터리 생성
#   2) Loki config 생성
#   3) Grafana datasource provisioning 파일 생성
#   4) Compose 파일 생성
#   5) PLG stack 실행
#   6) Loki readiness 확인

---
- name: Create PLG base directories (Root owned)
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ plg_base_dir }}"
    - "{{ plg_config_dir }}"
    - "{{ grafana_provisioning_dir }}"
    - "{{ grafana_dashboards_provisioning_dir }}" # 추가: 대시보드 프로비저닝 설정 폴더
    - "{{ grafana_dashboards_json_dir }}"         # 추가: 실제 대시보드 JSON 저장 폴더

- name: Create Data directories with writable permission for Docker containers
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0777"  # Grafana(472) 및 Loki(10001) 컨테이너 유저가 쓸 수 있도록 777 설정
  loop:
    - "{{ loki_root_dir }}"
    - "{{ loki_data_dir }}"
    - "{{ loki_rules_dir }}"
    - "{{ loki_compactor_dir }}"
    - "{{ grafana_data_dir }}"

- name: Deploy Loki config
  template:
    src: loki-config.yaml.j2
    dest: "{{ plg_config_dir }}/loki-config.yaml"
    mode: "0644"
  register: loki_cfg

- name: Deploy Grafana datasource provisioning
  template:
    src: grafana-datasources.yml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources.yml"
    mode: "0644"
  register: grafana_cfg

- name: Deploy Grafana dashboard provisioning config
  template:
    src: grafana-dashboards-provisioning.yml.j2
    dest: "{{ grafana_dashboards_provisioning_dir }}/dashboards.yml"
    mode: "0644"
  register: grafana_db_prov

- name: Deploy Node Exporter Full Dashboard JSON
  copy:
    src: node-exporter-dashboard.json
    dest: "{{ grafana_dashboards_provisioning_dir }}/node-exporter-dashboard.json"
    mode: "0644"
  register: grafana_db_json

- name: Deploy Loki Logs Dashboard JSON
  copy:
    src: loki-dashboard.json  # (13186_rev.json 원본 파일)
    dest: "{{ grafana_dashboards_provisioning_dir }}/loki-dashboard.json"
    mode: "0644"
  register: grafana_loki_json

