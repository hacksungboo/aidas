#/home/user1/aidas/infra/ansible/inventory.ini 
#=============================================================================
# AIDAS 프로젝트 Ansible 인벤토리
# 다정님 EC2 IP 확정 후 [ec2_workers] 섹션 주석 해제 및 IP 입력
# =============================================================================

# ------------------------------------------------------------------------------
# [온프레미스 서버] Docker / Ollama / Promtail 설치 대상 (VMware VM)
# ansible_host          : 서버 실제 IP
# ansible_user          : SSH 접속 계정 (Rocky Linux 기본값: rocky)
# ansible_ssh_private_key_file : SSH 개인키 경로
# ------------------------------------------------------------------------------
[onpremise]
controller ansible_host=ONPREMISE_HOST_IP ansible_user=rocky ansible_ssh_private_key_file=~/.ssh/id_rsa

[rocky02]
rocky02 ansible_host=172.16.8.202 ansible_user=user1 ansible_ssh_private_key_file=~/.ssh/id_rsa

[ubuntu]
ubuntu01 ansible_host=172.16.8.203 ansible_user=user1 ansible_ssh_private_key_file=~/.ssh/id_rsa
# ------------------------------------------------------------------------------
# [EC2 워커 노드] Docker 설치 대상 — Promtail은 Swarm 스택 컨테이너로 실행
# 다정님 EC2 IP 확정 후 주석 해제하여 사용
# ------------------------------------------------------------------------------
[ec2_workers]
# worker1 ansible_host=EC2_WORKER_1_IP ansible_user=rocky ansible_ssh_private_key_file=~/.ssh/aidas-ec2-key.pem
# worker2 ansible_host=EC2_WORKER_2_IP ansible_user=rocky ansible_ssh_private_key_file=~/.ssh/aidas-ec2-key.pem

# ------------------------------------------------------------------------------
# [공통 변수] 전체 호스트에 적용
# ------------------------------------------------------------------------------
[all:vars]

# Python 인터프리터 경로 (Rocky Linux 8 기준)
ansible_python_interpreter=/usr/bin/python3

# ------------------------------------------------------------------------------
# [서비스 변수] 각 컴포넌트 연결 정보
# ------------------------------------------------------------------------------

# Promtail → Loki 로그 전송 주소 (온프레미스 서버 IP와 동일)
loki_host=ONPREMISE_HOST_IP

# ------------------------------------------------------------------------------
# [Ollama 변수] 로컬 LLM 설정
# ------------------------------------------------------------------------------

# Pull할 모델명 (ollama pull 명령에 사용)
ollama_model=llama3

# ------------------------------------------------------------------------------
# [Llama3 변수] 모델 Pull 제어
# ------------------------------------------------------------------------------

# Llama3 Pull 태그 — 디스크 부족 시 --skip-tags llama3_pull 으로 스킵함
# ansible-playbook playbook.yml -i inventory.ini --skip-tags llama3_pull
